name: SpellCheck
on:
  push:
    branches:
      - 'main'
    tags: '*'
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  spellcheck:
    name: "SpellCheck"
    uses: "SciML/.github/.github/workflows/spellcheck.yml@v1"
    secrets: "inherit"
