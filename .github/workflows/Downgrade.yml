name: Downgrade
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  downgrade:
    name: "Downgrade"
    strategy:
      fail-fast: false
      matrix:
        group:
          - Core
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      group: "${{ matrix.group }}"
      julia-version: "lts"
    secrets: "inherit"
